name: Build and deploy Lean docs

on:
  push:
    branches:
      - main
    paths:
      - 'AsymptoticStatistics/**'
      - 'AsymptoticStatistics.lean'
      - 'lakefile.lean'
      - 'lean-toolchain'
      - 'lake-manifest.json'
      - 'Scripts/**'
      - 'website/src/**'
      - 'website/public/**'
      - 'website/package*.json'
      - 'website/index.html'
      - 'website/vite.config.ts'
      - 'website/tailwind.config.js'
      - 'website/tsconfig.json'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Detect which file groups actually changed in this push.
      # workflow_dispatch always rebuilds everything (lean-changed defaults to true).
      - name: Detect changed file groups
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            lean:
              - 'AsymptoticStatistics/**'
              - 'AsymptoticStatistics.lean'
              - 'lakefile.lean'
              - 'lean-toolchain'
              - 'lake-manifest.json'
              - 'Scripts/**'

      # Cache the built Lean docs so website-only pushes skip the 45-min build.
      - name: Restore Lean docs cache
        id: docs-cache
        uses: actions/cache@v4
        with:
          path: .lake/build/doc
          key: lean-docs-${{ hashFiles('lean-toolchain', 'lakefile.lean', 'lake-manifest.json') }}
          restore-keys: lean-docs-

      # All Lean steps are skipped when only website files changed AND a cached
      # doc build exists. Manual workflow_dispatch always rebuilds.
      - name: Install elan
        if: steps.filter.outputs.lean == 'true' || steps.docs-cache.outputs.cache-hit != 'true' || github.event_name == 'workflow_dispatch'
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show Lean version
        if: steps.filter.outputs.lean == 'true' || steps.docs-cache.outputs.cache-hit != 'true' || github.event_name == 'workflow_dispatch'
        run: lean --version

      - name: Update Lake dependencies (fetch doc-gen4)
        if: steps.filter.outputs.lean == 'true' || steps.docs-cache.outputs.cache-hit != 'true' || github.event_name == 'workflow_dispatch'
        run: lake -Kenv=dev update

      - name: Fetch Mathlib cache
        if: steps.filter.outputs.lean == 'true' || steps.docs-cache.outputs.cache-hit != 'true' || github.event_name == 'workflow_dispatch'
        run: lake exe cache get || true

      - name: Build project
        if: steps.filter.outputs.lean == 'true' || steps.docs-cache.outputs.cache-hit != 'true' || github.event_name == 'workflow_dispatch'
        run: lake build

      - name: Build documentation
        if: steps.filter.outputs.lean == 'true' || steps.docs-cache.outputs.cache-hit != 'true' || github.event_name == 'workflow_dispatch'
        run: lake -Kenv=dev build AsymptoticStatistics:docs

      - name: Generate dependency graphs
        if: steps.filter.outputs.lean == 'true' || steps.docs-cache.outputs.cache-hit != 'true' || github.event_name == 'workflow_dispatch'
        run: lake exe deps || echo "deps extraction failed; site will fall back to doc-gen4 links"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Build the Asymptotica website
        working-directory: website
        run: |
          npm ci
          npm run build

      - name: Prepare GitHub Pages site
        run: |
          mkdir -p site/docs site/website
          # Copy Lean docs only when they were built or restored from cache.
          if [ -d ".lake/build/doc" ] && [ "$(ls -A .lake/build/doc 2>/dev/null)" ]; then
            cp -r .lake/build/doc/* site/docs/
          fi
          cp -r website/dist/* site/website/
          # Root redirects visitors to the interactive Asymptotica website.
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Asymptotic Statistical Theory in Lean 4</title>
              <meta http-equiv="refresh" content="0; url=./website/">
              <link rel="canonical" href="./website/">
              <style>
                body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 46rem; margin: 4rem auto; padding: 0 1.25rem; line-height: 1.6; color: #1b1b1b; }
                h1 { font-size: 1.9rem; margin-bottom: 0.25rem; }
                a { color: #b07414; }
                .btn { display: inline-block; margin-top: 1rem; margin-right: 0.5rem; padding: 0.6rem 1.1rem; background: #1b1b1b; color: #fff; border-radius: 999px; text-decoration: none; }
                .btn.alt { background: transparent; color: #1b1b1b; border: 1px solid #ccc; }
                .muted { color: #555; }
              </style>
            </head>
            <body>
              <h1>Asymptotic Statistical Theory in Lean 4</h1>
              <p class="muted">Redirecting to the interactive <strong>Asymptotica</strong> atlas&hellip;</p>
              <p>
                <a class="btn" href="./website/">Open the atlas &rarr;</a>
                <a class="btn alt" href="./docs/">API documentation</a>
              </p>
              <p class="muted">Source:
              <a href="https://github.com/junwei-lu/Lean-Asymptotic-Statistical-Theory">github.com/junwei-lu/Lean-Asymptotic-Statistical-Theory</a></p>
            </body>
          </html>
          EOF

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
