name: Build and deploy Lean docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Show Lean version
        run: lean --version

      - name: Update Lake dependencies (fetch doc-gen4)
        run: lake -Kenv=dev update

      - name: Fetch Mathlib cache
        run: lake exe cache get || true

      - name: Build project
        run: lake build

      - name: Build documentation
        run: lake -Kenv=dev build AsymptoticStatistics:docs

      - name: Prepare GitHub Pages site
        run: |
          mkdir -p site/docs
          cp -r .lake/build/doc/* site/docs/
          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>Asymptotic Statistical Theory in Lean 4</title>
              <style>
                body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 46rem; margin: 4rem auto; padding: 0 1.25rem; line-height: 1.6; color: #1b1b1b; }
                h1 { font-size: 1.9rem; margin-bottom: 0.25rem; }
                a { color: #0b65c2; }
                .btn { display: inline-block; margin-top: 1.25rem; padding: 0.6rem 1.1rem; background: #0b65c2; color: #fff; border-radius: 6px; text-decoration: none; }
                .muted { color: #555; }
              </style>
            </head>
            <body>
              <h1>Asymptotic Statistical Theory in Lean 4</h1>
              <p class="muted">A Lean 4 / Mathlib formalization of asymptotic statistical theory:
              local asymptotic normality, empirical processes, efficiency bounds, and more.</p>
              <p><a class="btn" href="./docs/">Browse the API documentation &rarr;</a></p>
              <p class="muted">Source:
              <a href="https://github.com/junwei-lu/Lean-Asymptotic-Statistical-Theory">github.com/junwei-lu/Lean-Asymptotic-Statistical-Theory</a></p>
            </body>
          </html>
          EOF

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
